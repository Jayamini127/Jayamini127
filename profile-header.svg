<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="55%" stop-color="#0f3a4a"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="260" fill="url(#bgGrad)"/>

  <!-- decorative shapes -->
  <circle cx="1080" cy="55" r="90" fill="#22d3ee" opacity="0.07"/>
  <circle cx="980" cy="215" r="55" fill="#38bdf8" opacity="0.06"/>
  <circle cx="1155" cy="190" r="28" fill="#67e8f9" opacity="0.10"/>

  <!-- bottom wave -->
  <path d="M0,260 C300,195 900,260 1200,195 L1200,260 L0,260 Z" fill="url(#waveGrad)"/>

  <!-- accent bar -->
  <rect x="60" y="60" width="6" height="110" rx="3" fill="#22d3ee"/>

  <!-- availability badge -->
  <rect x="840" y="30" width="300" height="34" rx="17" fill="#0e7490" opacity="0.35"/>
  <circle cx="862" cy="47" r="6" fill="#4ade80"/>
  <text x="880" y="52" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e2f8ff">Open to Internship Opportunities</text>

  <!-- main text -->
  <text x="90" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#f8fafc">Jayamini Pabasara Karunarathna</text>
  <text x="91" y="152" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#67e8f9">Information Technology Undergraduate</text>
  <text x="91" y="184" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#cbd5e1">Aspiring QA Engineer &amp; Full-Stack Developer </text>
</svg>
